name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # NEXT_PUBLIC_* values are inlined at build time. Using the real prod
      # API origin so PR builds detect breakages with what actually ships.
      # Note: NODE_ENV is intentionally not set — `npm ci` with NODE_ENV=production
      # skips devDependencies (typescript, eslint, tailwindcss). `next build`
      # sets NODE_ENV=production internally during the build itself.
      NEXT_PUBLIC_API_URL: https://api.cpc24.co.in
      # Public-by-design OAuth client ID — kept in sync with deploy.yml so PR
      # builds inline the same Google sign-in config that actually ships.
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: 575329460316-7v1j8slftv98mnvq4uhgj1i8fk138h48.apps.googleusercontent.com
      # Public S3 base — kept in sync with deploy.yml so PR builds inline the same
      # value used to render saved image thumbnails in the admin product editor.
      NEXT_PUBLIC_S3_PUBLIC_BASE_URL: https://cpn-uploads.s3.ap-south-1.amazonaws.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (standalone)
        run: npm run build

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js
          test -d .next/static
          test -d public
